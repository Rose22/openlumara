    ---

    A manually written frontend for openlumara, re-coded from the ground up using libraries
    such as Alpine.js. I chose alpine.js due to its lightweight-ness, and still being capable enough
    to power this WebUI. You won't find React bloat here!

    Uses FastAPI and Jinja2 on the backend, and separates HTML files into different components
    that get included using Jinja2's include statement.
    For a nice, clean codebase.

    OpenLumara used to have a WebUI that was mostly AI-coded, but that's finally no longer the case!
-->
<html>
    <head>
        <title>{{ title }}</title>
        
        <!-- 
            ### libraries ###
        -->
        <!-- text area autoresize plugin for Alpine.js -->
        <script src="{{ url_for('assets', path='js/libs/alpine-autosize.min.js') }}" defer></script>

        <!-- automatic animation plugin for Alpine.js -->
        <script src="{{ url_for('assets', path='js/libs/alpine-animation.min.js') }}" defer></script>

        <!-- Alpine.js <3 (thank you for making a lightweight framework that fits perfectly with openlumara) -->
        <script src="{{ url_for('assets', path='js/libs/alpine.min.js') }}" defer></script>

        <!-- DOMPurify (XSS protection) -->
        <script src="{{ url_for('assets', path='js/libs/purify.min.js') }}"></script>

        <!-- marked (markdown support) -->
        <script src="{{ url_for('assets', path='js/libs/marked.min.js') }}"></script>

        <!-- 
            ### stylesheets ### 
        -->
        {% for file in css_files %}
        <link rel="stylesheet" href="{{ url_for('assets', path='css/'+file) }}" />
        {% endfor %}
    </head>
    <body>
        <!-- the x-data is defined in js/alpine/data.js -->
        <section id="main-wrapper" x-data="main">
            {% if config.get("enable_sidebar") %}
                <section id="sidebar">
                    {% include 'sidebar.html' %}
                </section>
            {% endif %}

            <section id="chat-window">
                {% include 'chat.html' %}
            </section>
        </section>

        {% include 'modals.html' %}

        <!-- javascript files -->
        <script src="{{ url_for('assets', path='js/utils.js') }}"></script>

        <script src="{{ url_for('assets', path='js/alpine/data.js') }}"></script>
        <script src="{{ url_for('assets', path='js/alpine/stores.js') }}"></script>
        <script src="{{ url_for('assets', path='js/alpine/directives.js') }}"></script>
        <script src="{{ url_for('assets', path='js/alpine/turns.js') }}"></script>

        {% for file in js_files %}
        <script src="{{ url_for('assets', path='js/'+file) }}"></script>
        {% endfor %}

        <script src="{{ url_for('assets', path='js/alpine/init.js') }}"></script>
    </body>
</html>
