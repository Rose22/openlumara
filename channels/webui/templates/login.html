<!DOCTYPE html>
<html lang="en" x-data="{ username: '', password: '', loading: false }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OpenLumara</title>
    <link rel="stylesheet" href="{{ url_for('assets', path='css/base/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('assets', path='css/base/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('assets', path='css/login.css') }}">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <h1>OpenLumara</h1>
            <form method="POST" action="/login" @submit="loading = true">
                {% if error %}
                    <div class="error-msg">{{ error }}</div>
                {% endif %}
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" x-model="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" x-model="password" required>
                </div>
                <button type="submit" :disabled="loading">Sign In</button>
            </form>
        </div>
    </div>
</body>
</html>
