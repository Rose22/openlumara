<!-- MODULES: Unified list (no module selected) -->
<template x-if="(activeCategory === 'modules' || activeCategory === 'user_modules') && !activeModule">
    <div class="module-unified-list">
        <h3 x-text="categories[activeCategory].title"></h3>
        <p class="settings-section-desc" x-text="categories[activeCategory].description"></p>
        
        <!-- All modules (enabled first, then disabled) -->
        <template x-for="module in [...categories[activeCategory].enabled, ...categories[activeCategory].disabled]" :key="module">
            <div class="module-unified-card" :class="{ 'disabled': !categories[activeCategory].enabled.includes(module) }">
                <div class="module-info" @click="activeModule = module">
                    <span type="button" class="module-name-btn" x-text="formatLabel(module)"></span>
                    <p class="module-description" x-html="renderMarkdown(categories[activeCategory].descriptions[module]) || ''"></p>
                </div>
                <button type="button" :class="{'toggle-active': true, 'toggle-off': categories[activeCategory].disabled.includes(module), 'toggle-on': categories[activeCategory].enabled.includes(module) }" 
                        @click="toggleEnabled(activeCategory, module)">
                </button>
            </div>
        </template>
    </div>
</template>

<!-- MODULES: Drill-down (module selected) -->
<template x-if="activeModule && (activeCategory === 'modules' || activeCategory === 'user_modules')">
    <div class="module-drilldown">
        <div x-animate.duration.120ms>
            <button type="button" @click="activeModule = null" class="mobile-back-btn">← Back</button>
            <h3 x-text="formatLabel(activeModule)"></h3>
            <p class="settings-section-desc" x-html="renderMarkdown(categories[activeCategory].descriptions[activeModule]) || ''"></p>
            
            <template x-if="categories[activeCategory].settings[activeModule] && categories[activeCategory].settings[activeModule].value">
                <template x-for="[key, setting] in Object.entries(categories[activeCategory].settings[activeModule].value)" :key="key">
                    <div class="setting-item">
                        {% include 'modals/settings/fields.html' %}
                    </div>
                </template>
            </template>
        </div>
        
        <template x-if="!categories[activeCategory].settings[activeModule] || !categories[activeCategory].settings[activeModule].value">
            <p class="no-settings-msg">This module has no configurable settings.</p>
        </template>
    </div>
</template>
