<div x-show="$store.ui.currentModal === 'settings'" x-cloak>
    <div class="settings-modal modal" x-data="settingsModal()">
        <div class="header">
            <h2 id="title">Settings</h2>
            <button class="close" @click="closeAndSave()" aria-label="Close settings">×</button>
        </div>

        <!-- Error State -->
        <div x-show="error" class="settings-error">
            <span x-text="error"></span>
            <button @click="load()">Retry</button>
        </div>

        <!-- Settings Content -->
        <div class="body" x-show="!error">
            <!-- SIDEBAR NAV -->
            {% include 'modals/settings/sidebar.html' %}

            <!-- MAIN CONTENT AREA -->
            <main :class="{'content-wrapper': true, 'nopadding': activeCategory === 'system_logs'}" x-animate.duration.170ms>
                <!-- Loading State -->
                <div x-show="$store.settings.loading" class="loading">
                    <div class="spinner"></div>
                </div>

                <template x-if="!$store.settings.loading">
                    <div class="content">
                        <!-- Mobile: show category list when no category selected -->
                        <template x-if="mobile && !activeCategory">
                            <div class="mobile-category-list">
                                <template x-for="[cat, data] in $store.settings.sorted$store.settings.categories" :key="cat">
                                    <button @click="activeCategory = cat" class="mobile-category-btn">
                                        <span x-text="data.title"></span>
                                    </button>
                                </template>
                            </div>
                        </template>

                        <!-- MODULES CONTENT -->
                        {% include 'modals/settings/modules.html' %}

                        <!-- CHANNELS CONTENT -->
                        {% include 'modals/settings/channels.html' %}

                        <!-- APPEARANCE (special theme section) -->
                        {% include 'modals/settings/appearance.html' %}

                        <!-- AUDIO -->
                        {% include 'modals/settings/audio.html' %}

                        <!-- SYSTEM LOGS -->
                        {% include 'modals/settings/logs.html' %}
                        
                        <!-- ALL OTHER $store.settings.categories (core and so on) -->
                        <template x-if="!activeModule && !activeChannel && 
                                         !['appearance', 'audio', 'modules', 'user_modules', 'channels', 'user_channels', 'system_logs'].includes(activeCategory) && 
                                         activeCategory">
                            <div class="section">
                                <h3 class="section-title" x-text="$store.settings.categories[activeCategory].title"></h3>
                                <p class="section-desc" x-text="$store.settings.categories[activeCategory].description"></p>
                                
                                <template x-for="[key, setting] in Object.entries($store.settings.categories[activeCategory].settings)" :key="key">
                                    {% include 'modals/settings/fields.html' %}
                                </template>
                            </div>
                        </template>
                    </div>
                </template>
            </main>

        </div>
    </div>
</div>
