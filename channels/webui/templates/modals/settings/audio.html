<!-- AUDIO SETTINGS -->
<template x-if="activeCategory === 'audio' && !activeModule && !activeChannel">
    <div x-data="{
        get vol() { return Alpine.store('audio').volume; },
        get tokenVol() { return Alpine.store('audio').tokenVolume; },
        get sounds() { return Alpine.store('audio').sounds }
    }">
        <!-- Sound Effects Section -->
        <h3 class="section-title" x-text="categories.audio.title"></h3>
        <p class="section-desc" x-text="categories.audio.description"></p>

        <hr>

        <!-- Volume -->
        <div class="item">
            <div class="toggle-row">
                <label class="label">Volume</label>
                <input type="range" min="0" max="100" value="0"
                       @input="Alpine.store('audio').setVolume(parseInt($event.target.value) / 100)">
                <span class="label" style="min-width: 45px; text-align: right;" x-text="Math.round(vol * 100) + '%'"></span>
            </div>
        </div>

        <!-- Token Generation Volume -->
        <!--
        <div class="item">
            <div class="toggle-row">
                <label class="label">Token Generation Volume</label>
                <input type="range" min="0" max="100" value="0"
                       @input="Alpine.store('audio').setTokenVolume(parseInt($event.target.value) / 100)">
                <span class="label" style="min-width: 45px; text-align: right;" x-text="Math.round(tokenVol * 100) + '%'"></span>
            </div>
        </div>
        -->

        <!-- Sound Files -->
        <template x-for="soundId in ['send_message', 'response_start', 'processing', 'typewriter', 'typing', 'token', 'completion', 'reasoning_end']" :key="soundId">
            <div class="item">
                <div class="toggle-row">
                    <label class="label" x-text="soundId.charAt(0).toUpperCase() + soundId.slice(1).replace('_', ' ',) + ' Sound'"></label>
                    <button type="button" :class="['toggle', sounds[soundId + 'Enabled'] ? 'toggle-on' : 'toggle-off']"
                            @click="Alpine.store('audio').setSoundEnabled(soundId, !sounds[soundId + 'Enabled'])">
                    </button>
                </div>

                <div class="item">
                    <p class="description" x-text="sounds[soundId + 'SoundName'] || 'Using generated sound'"></p>
                </div>

                <div class="item">
                    <label class="btn">
                        <span>Upload</span>
                        <input type="file" accept="audio/*" hidden
                               @change="handleSoundUpload($event, soundId)">
                    </label>
                    <div class="actions" style="display: inline-flex; gap: 8px; vertical-align: middle;">
                        <button type="button" class="btn" x-show="sounds[soundId + 'SoundData']"
                                @click="previewSound(soundId)">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="5 3 19 12 5 21 5 3"></polygon>
                            </svg>
                            <span>Play</span>
                        </button>
                        <button type="button" class="btn" x-show="sounds[soundId + 'SoundData']"
                                @click="Alpine.store('audio').clearSound(soundId)">
                            Clear
                        </button>
                    </div>
                </div>
            </div>
        </template>
    </div>
</template>
