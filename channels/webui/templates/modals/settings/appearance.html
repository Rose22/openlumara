<template x-if="activeCategory === 'appearance' && !activeModule && !activeChannel">
    <div class="settings-section">
        <h3 class="settings-section-title" x-text="categories.appearance.title"></h3>
        <p class="settings-section-desc" x-text="categories.appearance.description"></p>
        
        <div class="theme-section">
            <h4>Theme</h4>
            <div class="theme-buttons">
                <template x-for="theme in ['light', 'dark', 'auto']" :key="theme">
                    <button type="button" :class="{ active: settings.theme === theme }" @click="handleChange('theme', theme)" x-text="theme"></button>
                </template>
            </div>
            <div class="theme-controls">
                <label>Font Size: <input type="range" min="12" max="20" x-model.number="settings.fontSize" @input="handleChange('fontSize', $event.target.value)"></label>
            </div>
        </div>
        
        <!-- Appearance settings from data -->
        <template x-if="categories.appearance.data && Object.keys(categories.appearance.data).length > 0">
            <template x-for="[key, value] in Object.entries(categories.appearance.data)" :key="key">
                <div class="settings-group" x-data="{ collapsed: false }">
                    <div x-show="!collapsed" class="settings-group-content">
                        <template x-for="[nestedKey, nestedValue] in Object.entries(value)" :key="nestedKey">
                            {% include 'modals/settings/fields.html' %}
                        </template>
                    </div>
                </div>
            </template>
        </template>
    </div>
</template>
