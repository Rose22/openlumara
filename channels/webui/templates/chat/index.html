{% if config.get('enable_chat_header') %}
    {% include 'chat/header.html' %}
{% endif %}
{% if config.get('enable_chat_titlebar') %}
    {% include 'chat/titlebar.html' %}
{% endif %}

<template x-if="$store.ui.notice">
    <div class="notice" x-html="$store.ui.notice"></div>
</template>

<div id="messages" x-ref="messages"
    @scroll="$store.ui.onScroll()"
    x-effect="$watch('$store.chat.turns', () => $nextTick(() => $store.ui.forceScrollToBottom()), { deep: true })"
>
    <template x-for="(turn, turnIndex) in $store.chat.turns" :key="turnIndex">
        <div>
            <!-- user messages get rendered seperately -->
            <template x-if="turn.role === 'user'">
                <div class="message-wrapper user">
                    <div :class="{
                        'message': true,
                        'user': turn.messages[0].role === 'user',
                        'pending': turn.messages[0].msgId === $store.stream.pendingMessageId
                    }">
                    <template x-if="$store.chat.editingMessageIndex != turn.messages[0].index">
                        <div>
                            <!-- Render multimodal user content -->
                            <template x-if="Array.isArray(turn.messages[0].content)">
                                <div class="multimodal-content">
                                    <template x-for="(block, blockIndex) in turn.messages[0].content" :key="'block-' + blockIndex">
                                        <div>
                                            <!-- Text content -->
                                            <template x-if="block.type === 'text'">
                                                <div x-html="renderMarkdown(block.text)"></div>
                                            </template>
                                            <!-- Image content -->
                                            <template x-if="block.type === 'image_url'">
                                                <div class="media-preview image-preview">
                                                    <img :src="block.image_url.url" :alt="block.image_url.url" loading="lazy" />
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>

                            <!-- normal text message -->
                            <template x-if="typeof turn.messages[0].content === 'string'">
                                <div x-html="renderMarkdown(turn.messages[0].content)" :class="{'command': turn.messages[0].is_cmd}"></div>
                            </template>
                            
                            <template x-if="turn.messages[0].msgId === $store.stream.pendingMessageId">
                                <span class="status">Sending..</span>
                            </template>
                        </div>
                    </template>

                        <template x-if="turn.messages[0].msgId !== $store.stream.pendingMessageId && $store.chat.editingMessageIndex != turn.messages[0].index">
                            <div class="message-buttons">
                                    <button @click="$store.chat.startEdit(turn.messages[0].index)" title="Edit" :disabled="$store.stream.state != 'idle'">
                                        {% include 'svg/edit.svg' %}
                                    </button>
                                    <button @click="$store.chat.regenerateMessage(turn.messages[0].index)" title="Regenerate" :disabled="$store.stream.state != 'idle'">
                                        {% include 'svg/reload.svg' %}
                                    </button>
                                    <button @click="$store.chat.deleteMessage(turn.messages[0].index)" title="Delete" :disabled="$store.stream.state != 'idle'">
                                        {% include 'svg/trash.svg' %}
                                    </button>
                                </div>
                            </div>
                        </template>

                        <template x-if="$store.chat.editingMessageIndex === turn.messages[0].index">
                            <div class="flex fullwidth editing">
                                <textarea x-model="editContent" rows="3"></textarea>
                                <div class="edit-actions">
                                    <button @click="$store.chat.saveEdit($store.chat.editingMessageIndex)">Save</button>
                                    <button @click="$store.chat.cancelEdit()">Cancel</button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <!-- 
                assistant messages get collected into turns for display in the UI,
                by the turn() getter in js/alpine_main.js

                oh and it also contains the streaming message as the last message in the array
            -->
            <template x-if="turn.role === 'assistant'">
                <div>
                    <div class="message-wrapper assistant" x-data="{ messageActionId: turn.index }">
                        <div class="message assistant">
                            <!-- all messages within a turn are displayed within the same message bubble -->
                            <template x-for="(message, msgIndex) in turn.messages" :key="msgIndex">
                                <div :class="{'flex': true, 'fullwidth': true, 'command': message.is_cmd}">
                                    <!-- render the messages based on message role -->
                                    <template x-if="message.role === 'assistant'">
                                        <div class="flex fullwidth">
                                            <template x-if="(message.type === 'reasoning') || (message.type === 'history' && message.reasoning_content && message.reasoning_content.trim().length > 0) || (message.type === 'tool_calls' && message.reasoning_content && message.reasoning_content.trim().length > 0)">
                                                {% include 'chat/reasoning.html' %}
                                            </template>
                                            <template x-if="message.type === 'content' || message.type === 'history'">
                                                <div class="content" x-html="renderMarkdown(message.content)"></div>
                                            </template>
                                            <template x-if="message.type === 'tool_calls' || message.type === 'tool_call_delta'">
                                                {% include 'chat/toolcalls.html' %}
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>

                            <div class="message-buttons">
                                    <button @click="$store.chat.regenerateMessage(turn.index)" title="Regenerate" :disabled="$store.stream.state != 'idle'">
                                        {% include 'svg/reload.svg' %}
                                    </button>
                                    <button @click="$store.chat.deleteMessage(turn.index)" title="Delete" :disabled="$store.stream.state != 'idle'">
                                        {% include 'svg/trash.svg' %}
                                    </button>
                                </div>
                            </div>
                    </div>
                </div>
            </template>
        </div>
    </template>

    <!-- user message placeholder to display while the message is being sent to the API -->
    <!--
    <template x-if="$store.stream.state === 'sending'">
        <div class="message-wrapper user placeholder">
            <div class="message user placeholder">
                <span x-text="last_user_input"></span>
                <span class="placeholder-status">Sending..</span>
            </div>
        </div>
    </template>
    -->

    <!-- typing indicator -->
    <template x-if="$store.stream.state === 'received'">
        <div class="typing-indicator" id="typing" aria-label="AI is typing" x-ignore>
            <span></span><span></span><span></span>
        </div>
    </template>

    <!-- prompt processing indicator (works with llama.cpp) -->
    <template x-if="$store.stream.state === 'processing'">
        {% include 'chat/prompt_processing.html' %}
    </template>
</div>

{% include 'chat/upload.html' %}

<div id="input">
    {% include 'chat/input.html' %}
</div>
