<template x-if="Array.isArray(message.content)">
    <div class="multimodal-content">
        <template x-for="(block, blockIndex) in message.content" :key="'block-' + blockIndex">
            <div>
                <template x-if="block.type === 'text'">
                    <div x-html="renderMarkdown(block.text)"></div>
                </template>
                <template x-if="block.type === 'image_url'">
                    <div class="media-preview image-preview">
                        <img :src="block.image_url.url" :alt="block.image_url.url" loading="lazy" />
                    </div>
                </template>
            </div>
        </template>
    </div>
</template>

<template x-if="typeof message.content === 'string'">
    <div x-html="renderMarkdown(message.content)" :class="{'command': message.is_cmd}"></div>
</template>

<template x-if="message.index === $store.stream.pendingMessageId">
    <span class="status">Sending..</span>
</template>
