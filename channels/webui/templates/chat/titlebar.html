<div class="chat-title-bar" id="chat-title-bar">
    <div class="title">
        <div class="content">
            <span class="text" id="chat-title-text" x-text="chat.title"></span>
            <div id="tags" class="chat-title-tags"></div>
        </div>
        <button class="rename" id="chat-title-rename" onclick="renameCurrentChat()" title="Rename chat">
            {% include 'svg/edit.svg' %}
        </button>
    </div>
</div>
