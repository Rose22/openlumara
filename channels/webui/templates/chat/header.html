<header>
    <div class="left">
        <button class="menu-btn" title="Toggle sidebar" @click="$store.ui.toggleSidebar()" x-show="$store.ui.isMobile" x-cloak>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>
        <h1>{{ config.get("title") }}</h1>
    </div>
    <div class="right">
        {% if config.get("enable_streaming_state_display") %}
            <span x-text="$store.stream.state.replace('_', ' ')" class="stream-state"></span>
        {% endif %}

        <button class="btn" id="search-btn" title="Search messages (Ctrl+F)">
            {% include 'svg/search.svg' %}
        </button>
        <button class="btn" id="settings-btn" title="Settings (Ctrl+S)" @click="await $store.ui.openModal('settings')">
            {% include 'svg/gear.svg' %}
        </button>
        <button class="btn" title="Export chat">
            {% include 'svg/download.svg' %}
        </button>
        <button class="btn shortcuts-btn" title="Keyboard shortcuts (?)" x-show="!$store.ui.isMobile" x-cloak>
            {% include 'svg/keyboard.svg' %}
        </button>

        <button class="btn" title="Storage Editor" x-show="!$store.ui.isMobile" x-cloak>
            {% include 'svg/folder.svg' %}
        </button>
        <button class="btn" title="Clear chat" @click="
            await simpleSocketSend({
                'type': 'user_message',
                'content': {'role': 'user', 'content': '/clear'}
            })
        ">
            {% include 'svg/trash.svg' %}
        </button>
    </div>
</header>
