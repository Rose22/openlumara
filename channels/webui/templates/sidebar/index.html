<!-- list of categories -->
<div id="category-list" x-ref="category-list"
    x-show="!$store.ui.isMobile || $store.ui.showCategories" x-cloak
    >
    <div class="list">
        <template x-for="category in $store.chat.categories" :key="category">
            <ul :class="{'item': true, 'active': category == $store.chat.selectedCategory}" @click="
                $store.chat.selectCategory(category);
                if ($store.ui.isMobile) {
                    await $store.ui.toggleMobileSidebarView();
                }
                ">
                <span class="icon">
                    <template x-if="category === 'general'">
                        {% include 'svg/home.svg' %}
                    </template>
                    <template x-if="category != 'general'">
                        {% include 'svg/chat.svg' %}
                    </template>
                </span>
                <span class="title" x-text="category"></span>
            </ul>
        </template>
    </div>

    {% if login_enabled %}
        <div class="buttons">
            <!-- Logout button -->
            <button class="sidebar-btn" @click="if(confirm('Log out?')) window.location.href='/logout'">
                {% include 'svg/download.svg' %}
                <span>Logout</span>
            </button>
        </div>
    {% endif %}
</div>

<!-- list of chats -->
<div id="chat-list" x-ref="chat-list" x-data="{query: ''}"
    x-show="!$store.ui.isMobile || $store.ui.showChatList" x-cloak
>
    <button class="header-btn" x-text="$store.chat.selectedCategory" x-show="$store.ui.isMobile" x-cloak @click="$store.ui.toggleMobileSidebarView()"></button>

    <div class="search">
        <input name="search" type="text" placeholder="Search through your chats.." x-model="query">
    </div>

    <div class="chats">
        <template x-for="chat in $store.chat.chats" :key="chat.id">
            <!-- only show if it matches the current category and search query -->
            <template
                x-if="
                    chat.category === $store.chat.selectedCategory
                    &&
                    chat.title.toLowerCase().includes(query.toLowerCase())
                "
            >
                <!-- give selected chats a nice border via the CSS class -->
                <div
                    x-data="{ active: false }"
                    :id="`chat-${chat.id}`"
                    :class="{'item': true, 'active': chat.id === $store.chat.selectedChat}"
                    @click="
                    active = !active;
                    $store.chat.loadChat(chat.id);
                    if ($store.ui.isMobile) { $store.ui.showSidebar = false; }
                    "
                    x-init="
                        $nextTick(() => {
                            // autoscroll to the selected chat
                            if (chat.id === $store.chat.selectedChat) {
                                $el.scrollIntoView({ behavior: 'smooth' });
                            }
                        })
                    "
                >
                    <span class="title" x-text="chat.title || 'New chat'"></span>
                    <ul class="tags">
                        <template x-for="tag in chat.tags.slice(0,3)" :key="tag">
                            <li x-text="tag" class="tag"></li>
                        </template>
                    </ul>
                </div>
            </template>
        </template>
    </div>

    <button class="sidebar-btn" @click="$store.chat.newChat()">
        {% include 'svg/add.svg' %}
        New Chat
    </button>
</div>
