<!-- list of chats -->
<div id="chat-list" x-ref="chat-list">
    <template x-for="chat in chats">
        <div class="item" @click="selectChat(chat.id)">
            <span class="title" x-text="chat.title"></span>
            <ul class="tags" x-data="{ tags: chat.tags }">
                <template x-for="tag in tags">
                    <li x-text="tag" class="tag"></li>
                </template>
            </ul>
        </div>
    </template>
</div>
