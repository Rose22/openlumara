<button id="upload" title="Upload file" aria-label="Upload file">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
    </svg>
</button>
<input type="file" id="file-input" aria-hidden="true" multiple>

<!-- user_input is defined over in index.html, so that we have access to it everywhere -->
<textarea 
    id="text-input" placeholder="Type a message..." rows="1" aria-label="Message input"
    x-model="user_input"
></textarea>

<button id="send" aria-label="Send message" @click="await send(user_input)">Send</button>
<button id="stop" aria-label="Stop generation">
    <span class="stop-text">Stop</span>
